# Epic 1: Purchase Order Automation (AWS S3 -> MuleSoft IDP -> Salesforce)

This document centralizes all User Stories that are currently **coded and functional** in the `purchase-order-automation-app`.

---

## Story 1.1: Batch Document Ingestion (Scheduler)

<div style="background-color: #fff3cd; color: #856404; border-left: 5px solid #ffeeba; padding: 15px; margin-bottom: 20px; border-radius: 4px;">
    <strong>⚠️ PENDING CLIENT DEFINITION: AWS S3 Environment & Naming Convention</strong><br>
    The client must define the exact mapping of S3 buckets per environment and the standard naming convention for the PO files. The current available options in the AWS accounts are:
    <ul style="margin-top: 10px; margin-bottom: 10px;">
        <li><strong>Twist QA (749602843853):</strong> <code>twist-api-purchase-orders</code>, <code>twist-api-purchase-orders-dev</code>, <code>twist-api-purchase-orders-file</code>, <code>twist-api-purchase-orders-qa</code></li>
        <li><strong>Twist Staging (801883667361):</strong> <code>twist-api-purchase-orders-pdx-uat-a</code>, <code>twist-api-purchase-orders-pdx-uat-b</code>, <code>twist-api-purchase-orders-staging</code>, <code>twist-api-purchase-orders-staging-b2b</code></li>
        <li><strong>Twist Production (594425596548):</strong> <code>twist-api-purchase-orders-production</code></li>
        <li><strong>NonProdAccount (135808916707):</strong> <code>twist-api-purchase-orders</code></li>
    </ul>
    <strong>Questions for the Client:</strong><br>
    1. Which specific buckets should be mapped to each environment (Dev/QA/UAT/Prod)?<br>
    2. What is the standard naming convention or prefix required for the PO files (e.g., <code>po_file_*.pdf</code>)?
</div>

### Overview
- **Action:** A Scheduler runs hourly in the MuleSoft application.
- **Objective:** Scan the AWS S3 bucket for new Purchase Order PDFs (ignoring `.zip` files).
- **Architecture (Asynchronous):** Upon finding files, the flow does not process them immediately. It publishes the name of each file to a **Persistent VM Queue** (`po-processing-queue`) so they can be processed asynchronously, in parallel, and safely against network failures.

### Technical Specification
- **Source:** Mule Scheduler (`0 0 * * * ?`)
- **AWS S3 Actions:** `s3:ListObjects`
- **Target:** VM Queue (`<vm:publish>`)

## Story 1.2: On-Demand Trigger via System API (Salesforce)

### Overview
- **Action:** Salesforce can make a `GET /system/s3-file-lookup/v1/files/{fileName}` request searching for a specific file.
- **Objective:** Verify if the file has already arrived in S3. If yes, respond instantly with metadata (HTTP 200) and **trigger** the processing of this file.
- **Architecture (Asynchronous):** Just like the Scheduler, the API only publishes the filename to the **VM Queue** (`po-processing-queue`), unifying the processing pipeline for files arriving in batches or on-demand, preventing *Timeouts* on the Salesforce UI.

### Technical Specification
- **Source:** HTTP Listener (`8081`)
- **AWS S3 Actions:** `s3:ListObjects` (with filter)
- **Target:** VM Queue (`<vm:publish>`)
- **Responses:** `200 OK` (with metadata JSON) or `404 Not Found`.

## Story 1.3: Intelligent Extraction and Validation (Consumer)

<div style="background-color: #fff3cd; color: #856404; border-left: 5px solid #ffeeba; padding: 15px; margin-bottom: 20px; border-radius: 4px;">
    <strong>⚠️ PENDING BUSINESS RULE: Salesforce Error Mapping</strong><br>
    The processing of ERROR scenarios (Invalid Data) currently uses a generic DataWeave mapping, waiting for the client to provide the definitive Salesforce API field names tomorrow.
</div>

### Overview
- **Action:** The VM Queue Consumer (Listener) picks up one file at a time and executes the heavy processing.
- **Objective 1 (MuleSoft IDP):** Download the PDF from S3 and send it to **Intelligent Document Processing (IDP)** to extract information via OCR (PO Number, Amount, QuoteId, etc).
- **Objective 2 (Salesforce):** Evaluate the `ConfidenceScore`. If it is >= 90%, query the Quote in Salesforce. If the PO data exactly matches the CRM (Total, Addresses, Payment Method, and PO Number), the Quote is approved. Otherwise, the failure data is sent to the CRM.

### Validation Mapping (MuleSoft -> Salesforce)
| MuleSoft Data (IDP) | Salesforce Target Object & Field | Condition |
| :--- | :--- | :--- |
| `quoteId` | `Quote.Name` | SOQL `WHERE` clause |
| `totalAmount` | `Quote.GrandTotal` | Match Rule (Validation) |
| `poNumber` | `Opportunity.Purchase_Order_Reference__c` | Match Rule (Validation) |
| `billingAddress` | `Opportunity.FinServ__BillingAddress__c` | Match Rule (Validation) |
| `shippingAddress` | `Opportunity.FinServ__ShippingAddress__c` | Match Rule (Validation) |
| `paymentMethod` | `Opportunity.FinServ__PaymentMethod__c` | Match Rule (Validation) |
| **Status: "Approved"** | `Quote.Status` | Updates Salesforce if **Passed** |
| **"Draft" (Placeholder)** | `Quote.Status` | Updates Salesforce if **Failed** |

### Sequence Diagram
```mermaid
    sequenceDiagram
        autonumber
        participant Sch as Scheduler/API
        participant S3 as AWS S3
        participant VM as VM Queue (po-processing-queue)
        
        Sch->>S3: List Objects
        S3-->>Sch: Return Object Key
        Sch->>VM: Publish Object Key
        
        participant Mule as MuleSoft Consumer
        participant IDP as MuleSoft IDP API
        participant SFDC as Salesforce CRM
        
        VM->>Mule: Consume Object Key
        Mule->>S3: Get Object (PDF content)
        S3-->>Mule: Binary Stream
        
        Mule->>IDP: POST /executions (Multipart/form-data)
        IDP-->>Mule: Execution ID
        
        loop Until Status == SUCCEEDED
            Mule->>IDP: GET /executions/{id}
            IDP-->>Mule: Status
        end
        
        Mule->>Mule: Extract PO Number, Amount, QuoteId, Score
        
        alt Confidence is High (>= 0.90)
            Mule->>SFDC: SOQL: SELECT Fields FROM Quote WHERE Name = :quoteId
            SFDC-->>Mule: Quote Record
            
            Mule->>Mule: Compare IDP Totals, PO Number, Addresses and Payment with Quote/Opportunity
            
            alt All Data Matches
                Mule->>SFDC: UPDATE Quote SET Status = 'Approved'
                SFDC-->>Mule: Success Ack
            else Data Mismatch
                Mule->>SFDC: UPDATE Quote (Set Error Fields - PENDING)
                SFDC-->>Mule: Success Ack
                Mule->>SFDC: CREATE Task (Subject: Manual Review Required)
            end
            
        else Confidence is Low (< 0.90)
            Mule->>SFDC: CREATE Task (Subject: Low Confidence Manual Review)
        end
        
        Mule->>S3: Copy Object (Archive folder)
        Mule->>S3: Delete Original Object
```

### Technical Specification
- **Source:** VM Listener (`po-processing-queue`)
- **AWS S3 Actions:** `s3:GetObject` (Download PDF)
- **IDP Actions:** `POST /executions` and `GET /executions/{id}` (Polling via `Until-Successful`)
- **Salesforce Actions:** `salesforce:query`, `salesforce:update` (Success and Error), `salesforce:create` (Exception Task).
- **Error Handling:** The `On-Error-Continue` ensures that if a file fails at any step, the transaction becomes an Exception Task in Salesforce, and the queue proceeds to the next document.

    <script type="module">
        const markdown = document.getElementById('markdown-content').textContent;
        
        // Parse markdown simply without custom renderer to avoid API breakages
        try {
            document.getElementById('content').innerHTML = marked.parse(markdown);
        } catch (e) {
            console.error("Marked parsing error:", e);
            document.getElementById('content').innerHTML = "<p style='color:red;'>Error parsing Markdown.</p>";
        }

        // Transform standard mermaid code blocks into our custom zoomable containers
        document.querySelectorAll('code.language-mermaid').forEach((el, index) => {
            const pre = el.parentElement;
            
            // Encode the text content properly
            let text = el.textContent;
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            const container = document.createElement('div');
            container.className = 'mermaid-container';
            container.dataset.pzIndex = index;
            container.innerHTML = `
                <div class="zoom-controls">
                    <button onclick="zoomIn(this)">Zoom In (+)</button>
                    <button onclick="zoomOut(this)">Zoom Out (-)</button>
                    <button onclick="resetZoom(this)">Reset</button>
                </div>
                <div class="mermaid-wrapper">
                    <div class="mermaid">${text}</div>
                </div>
            `;
            
            pre.replaceWith(container);
        });

        setTimeout(async () => {
            // Restore HTML entities in mermaid divs before rendering
            document.querySelectorAll('.mermaid').forEach(el => {
                el.innerHTML = el.innerHTML.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
            });
            
            try {
                await window.mermaid.run({
                    querySelector: '.mermaid'
                });
                
                setTimeout(() => {
                    document.querySelectorAll('.mermaid svg').forEach((svg, index) => {
                        svg.setAttribute('id', 'mermaid-svg-' + index);
                        svg.style.width = '100%';
                        svg.style.height = '100%';
                        svg.style.maxWidth = 'none';
                        
                        window['panZoom' + index] = svgPanZoom(svg, {
                            zoomEnabled: true,
                            controlIconsEnabled: false,
                            fit: true,
                            center: true,
                            minZoom: 0.5,
                            maxZoom: 10
                        });
                    });
                }, 300);
            } catch (e) {
                console.error("Mermaid error:", e);
            }
        }, 200);

        window.zoomIn = function(btn) {
            const index = btn.closest('.mermaid-container').dataset.pzIndex;
            if (window['panZoom' + index]) window['panZoom' + index].zoomIn();
        };
        window.zoomOut = function(btn) {
            const index = btn.closest('.mermaid-container').dataset.pzIndex;
            if (window['panZoom' + index]) window['panZoom' + index].zoomOut();
        };
        window.resetZoom = function(btn) {
            const index = btn.closest('.mermaid-container').dataset.pzIndex;
            if (window['panZoom' + index]) {
                window['panZoom' + index].resetZoom();
                window['panZoom' + index].center();
            }
        };
    </script>
